name: Gradle Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Allow manual execution

jobs:
  test:
    name: Run Gradle Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Set up Docker Compose
      run: |
        sudo apt-get update
        sudo apt-get install -y docker-compose-plugin
        docker compose version

    - name: Create required directories with proper permissions
      run: |
        mkdir -p build/test-results build/reports
        chmod -R 777 build
        
    - name: Grant execute permission for gradlew and scripts
      run: |
        chmod +x gradlew
        find . -name "*.sh" -type f -exec chmod +x {} \;

    - name: Debug current directory and permissions
      run: |
        echo "Current directory: $(pwd)"
        echo "User/Group: $(id -u)/$(id -g)"
        echo "Directory contents:"
        ls -la
        
        # Create Gradle home directory with proper permissions
        mkdir -p .gradle
        chmod -R 777 .gradle
        
        # Create build directory with proper permissions
        mkdir -p build/reports build/test-results
        chmod -R 777 build
    
    - name: Build Docker test images
      run: |
        echo "Building Docker test images..."
        docker compose -f docker-compose.test.yml build java17
        docker compose -f docker-compose.test.yml build java21

    - name: Run Java 17 tests
      id: java17-tests
      run: |
        # Create .gradle directory with proper permissions
        mkdir -p .gradle
        chmod -R 777 .gradle
        
        # Run tests with Java 17
        docker compose -f docker-compose.test.yml run --rm \
          -e DOCKER_USER_ID=$(id -u) \
          -e DOCKER_GROUP_ID=$(id -g) \
          java17 ./gradlew test --no-daemon
        
        # Fix permissions for generated files
        sudo chown -R $(id -u):$(id -g) build
        sudo chown -R $(id -u):$(id -g) .gradle

    - name: Run Java 21 tests
      id: java21-tests
      if: success() || failure()  # Run even if Java 17 tests fail, but not if they error
      run: |
        # Run tests with Java 21
        docker compose -f docker-compose.test.yml run --rm \
          -e DOCKER_USER_ID=$(id -u) \
          -e DOCKER_GROUP_ID=$(id -g) \
          java21 ./gradlew test --no-daemon
        
        # Fix permissions for generated files
        sudo chown -R $(id -u):$(id -g) build
        sudo chown -R $(id -u):$(id -g) .gradle
      
    - name: Check for Groovy script errors
      if: success() || failure()  # Run even if tests fail, but not if they error
      run: |
        echo "Running Groovy compilation check inside Docker container..."
        
        # Make sure permissions are correct before running
        sudo chown -R $(id -u):$(id -g) .gradle || true
        
        # Run Groovy compilation inside the Docker container without overriding volumes
        docker compose -f docker-compose.test.yml run --rm \
          -e DOCKER_USER_ID=$(id -u) \
          -e DOCKER_GROUP_ID=$(id -g) \
          java17 ./gradlew compileGroovy --info
        
        # Fix permissions after running
        sudo chown -R $(id -u):$(id -g) build || true
        sudo chown -R $(id -u):$(id -g) .gradle || true
        
        echo "Groovy compilation check completed"

    - name: Run code analysis
      if: success() || failure()  # Run even if tests fail, but not if they error
      run: |
        docker compose -f docker-compose.test.yml run --rm \
          -e DOCKER_USER_ID=$(id -u) \
          -e DOCKER_GROUP_ID=$(id -g) \
          java17 ./gradlew codenarc --no-daemon
          
        # Fix permissions for any new generated files
        sudo chown -R $(id -u):$(id -g) build
        sudo chown -R $(id -u):$(id -g) .gradle || true

    - name: Generate coverage report
      if: success() || failure()  # Run even if tests fail, but not if they error
      run: |
        docker compose -f docker-compose.test.yml run --rm \
          -e DOCKER_USER_ID=$(id -u) \
          -e DOCKER_GROUP_ID=$(id -g) \
          java17 ./gradlew jacocoTestReport --no-daemon
        
        # Fix permissions for coverage files
        sudo chown -R $(id -u):$(id -g) build
        sudo chown -R $(id -u):$(id -g) .gradle || true

    - name: Publish Test Results
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: test-results
        path: |
          build/reports/tests/test/**
          build/reports/tests/testJava17/**
          build/reports/tests/testJava21/**
          build/test-results/test/**
          build/test-results/testJava17/**
          build/test-results/testJava21/**

    - name: Publish Code Coverage
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: code-coverage
        path: |
          build/reports/jacoco/**
          build/reports/coverage/**

    - name: Publish Code Analysis Reports
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: code-analysis
        path: |
          build/reports/codenarc/**

    - name: Cleanup Docker resources
      if: always()
      run: |
        echo "Cleaning up Docker resources..."
        docker compose -f docker-compose.test.yml down -v --remove-orphans
        
        # Ensure all permissions are fixed at the end
        echo "Fixing final permissions..."
        sudo chown -R $(id -u):$(id -g) build || true
        sudo chown -R $(id -u):$(id -g) .gradle || true
        
        # List final directories for debugging
        echo "Final directory state:"
        ls -la
        echo "Build directory:"
        ls -la build || echo "Build directory not found"
        echo ".gradle directory:"
        ls -la .gradle || echo ".gradle directory not found"
