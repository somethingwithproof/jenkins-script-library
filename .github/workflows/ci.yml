name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual execution

# Cancel previous runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}


jobs:
  test:
    runs-on: [self-hosted]
    timeout-minutes: 15  # Prevent hung jobs
    permissions:
      contents: read
      checks: write
      security-events: write
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        gradle-version: 8.14.2
      
    - name: Lint with CodeNarc
      run: ./gradlew codenarcMain --no-daemon
        
    - name: Run unit tests
      run: ./gradlew test --no-daemon
        
    - name: Check for Hardcoded Credentials
      run: |
        # Check for hardcoded credentials - exclude build-logic, vendor, and common patterns
        if grep -r --include="*.groovy" -E "(password|token|secret)\s*=\s*['\"][^'\"]{8,}['\"]" . \
           | grep -v "build-logic\|vendor\|propName\|Credential\|getenv\|resolve\|variable"; then
          echo "Warning: Potential hardcoded credentials found"
          exit 1
        else
          echo "No hardcoded credentials found"
        fi
        
    - name: Check for Jenkins Best Practices
      run: |
        # Check for proper exception handling
        if grep -r --include="*.groovy" -L "try.*catch" . | grep -v "README\|LICENSE\|.git"; then
          echo "Warning: Some files may be missing exception handling"
        else
          echo "Exception handling check passed"
        fi
        
        # Check for proper logging
        if grep -r --include="*.groovy" -L "log\." . | grep -v "README\|LICENSE\|.git"; then
          echo "Warning: Some files may be missing proper logging"
        else
          echo "Logging check passed"
        fi
