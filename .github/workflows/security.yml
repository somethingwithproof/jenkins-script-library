name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sundays
  workflow_dispatch: # Allow manual execution

# Cancel previous runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}


jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up JDK 11
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Check for Hardcoded Secrets
      run: |
        # Check for potential hardcoded secrets, excluding known safe patterns
        # Exclude: build-logic (uses secure resolution), test files, and safe patterns
        if grep -r --include="*.groovy" \
             --exclude-dir="build-logic" \
             --exclude-dir="src/test" \
             --exclude-dir="src/integration-test" \
             -E "(password|token|secret|credential)\s*=\s*['\"][^'\"]{8,}['\"]" . \
           | grep -v "propName" \
           | grep -v "secureResolve" \
           | grep -v "Credential\(" \
           | grep -v "\.find\s*{"; then
          echo "Warning: Potential hardcoded secrets found"
          exit 1
        else
          echo "No hardcoded secrets found"
        fi
        
    - name: Check for Security Best Practices
      run: |
        # Check for proper input validation
        echo "Checking for input validation..."
        if grep -r --include="*.groovy" -L "validate" . | grep -v "README\|LICENSE\|.git"; then
          echo "Warning: Some files may be missing input validation"
        else
          echo "Input validation check passed"
        fi
        
        # Check for secure coding patterns
        echo "Checking for secure coding patterns..."
        if grep -r --include="*.groovy" -E "(System\.exit|Runtime\.exec)" .; then
          echo "Warning: Potentially unsafe system calls found"
        else
          echo "No unsafe system calls found"
        fi
