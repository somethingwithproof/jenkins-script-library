// Jenkins Script Library Settings
rootProject.name = 'jenkins-script-library'

// Enable Gradle features for better performance
enableFeaturePreview('TYPESAFE_PROJECT_ACCESSORS')
enableFeaturePreview('STABLE_CONFIGURATION_CACHE')

// Build cache configuration for faster builds
buildCache {
    local {
        enabled = true
        directory = new File(rootDir, 'build/cache')
    }
}

// Dependency resolution management
dependencyResolutionManagement {
    // Use repository definitions from build.gradle
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    
    // Version catalog for centralized dependency management
    versionCatalogs {
        libs {
            // Core versions
            version('jenkins', '2.361.4')
            version('groovy', '3.0.25')
            version('spock', '2.3-groovy-3.0')
            version('log4j', '2.25.0')
            
            // Define libraries
            library('groovy-all', 'org.codehaus.groovy', 'groovy-all').versionRef('groovy')
            library('spock-core', 'org.spockframework', 'spock-core').versionRef('spock')
            library('jenkins-core', 'org.jenkins-ci.main', 'jenkins-core').versionRef('jenkins')
            library('log4j-api', 'org.apache.logging.log4j', 'log4j-api').versionRef('log4j')
            library('log4j-core', 'org.apache.logging.log4j', 'log4j-core').versionRef('log4j')
        }
    }
}