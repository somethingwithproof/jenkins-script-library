// Configure JaCoCo verification with more detailed rules
jacocoTestCoverageVerification {
    violationRules {
        // Overall code coverage minimum
        rule {
            element = 'BUNDLE'
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.75
            }
        }
        
        // Core utility classes should have high coverage
        rule {
            element = 'CLASS'
            includes = ['com.github.thomasvincent.jenkinsscripts.util.*']
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.85
            }
        }
        
        // Ensure all branches have some coverage
        rule {
            element = 'CLASS'
            limit {
                counter = 'BRANCH'
                value = 'COVEREDRATIO'
                minimum = 0.60
            }
        }
        
        // Ensure all methods have some coverage
        rule {
            element = 'METHOD'
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.80
            }
        }
    }
}

