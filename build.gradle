// Configure test retry for all test tasks
tasks.withType(Test).configureEach {
    // Enable retry for flaky tests
    retry {
        maxRetries = 3
        maxFailures = 10
        failOnPassedAfterRetry = false
    }
    
    // Enable parallel test execution
    maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1
    
    // Fork a new JVM for each test class
    forkEvery = 1
    
    // Set JVM memory
    minHeapSize = "256m"
    maxHeapSize = "1g"
    
    // Set standard behavior
    useJUnit() // Using JUnit 4
    
    // Fail on test failures
    ignoreFailures = false
    
    // Set test execution timeouts
    timeout = Duration.ofMinutes(5)
    
    // Skip tests if requested
    onlyIf { !project.hasProperty('skipTests') }
    
    // Improved test outputs
    testLogging {
        events "passed", "skipped", "failed", "standardOut", "standardError"
        exceptionFormat = 'full'
        showExceptions = true
        showCauses = true
        showStackTraces = true
        
        // Display standard streams
        showStandardStreams = true
        
        // Log info about tests that are running
        info {
            events = ["started", "passed", "skipped", "failed", "standard_out", "standard_error"]
            displayGranularity = 2
        }
    }
    
    // Generate reports
    reports {
        html.required = true
        junitXml.required = true
    }
}

// Configure the integrationTest task
integrationTest {
    description = 'Runs integration tests.'
    group = 'verification'
    mustRunAfter test
    
    // Set system property for Jenkins test harness to find the WAR
    doFirst {
        def warFile = configurations.integrationTestRuntimeClasspath.find { it.name.contains('jenkins-war') && it.name.endsWith('.war') }
        if (warFile) {
            systemProperty 'jenkins.war', warFile.absolutePath
        }
    }
}

// Configure the performanceTest task
performanceTest {
    description = 'Runs performance tests.'
    group = 'verification'
    mustRunAfter test, integrationTest
    
    // Performance tests may need more time
    timeout = Duration.ofMinutes(15)
}

// Configure the architectureTest task
architectureTest {
    description = 'Runs architecture tests.'
    group = 'verification'
    mustRunAfter test
    
    // Architecture tests usually run quickly
    timeout = Duration.ofMinutes(2)
}

// Configure the endToEndTest task
endToEndTest {
    description = 'Runs end-to-end tests.'
    group = 'verification'
    mustRunAfter test, integrationTest
    
    // E2E tests typically need more time
    timeout = Duration.ofMinutes(20)
}

