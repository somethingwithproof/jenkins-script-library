// Add task to generate dependency reports
tasks.register('generateDependencyReports') {
    description = 'Generate detailed dependency reports'
    group = 'Help'
    
    doLast {
        // Print dependency insight
        project.configurations.compileClasspath.incoming.resolutionResult.allDependencies.each {
            println "Dependency: ${it}"
        }
        
        // Print dependency tree
        println "Dependency Tree:"
        project.configurations.compileClasspath.resolvedConfiguration.firstLevelModuleDependencies.each {
            printDependency(it, 1)
        }
    }
}

def printDependency(dep, level) {
    println "${' ' * level * 2}${dep.module.id}"
    dep.children.each { child ->
        printDependency(child, level + 1)
    }
}

// Configure dependency analysis
dependencyAnalysis {
    issues {
        all {
            // Ensure dependencies are properly declared
            onAny {
                severity('fail')
            }
            
            // Exempt certain issues
            onUnusedDependencies {
                exclude('org.codehaus.groovy:groovy-all')
            }
        }
    }
}

// Enhanced version management system
tasks.named('dependencyUpdates').configure {
    checkConstraints = true
    outputFormatter = 'json,xml,html'
    outputDir = "${buildDir}/reports/dependencies"
    reportfileName = 'dependency-updates'
    
    rejectVersionIf {
        isNonStable(it.candidate.version) && !isNonStable(it.currentVersion)
    }
}

def isNonStable = { String version ->
    def stableKeyword = ['RELEASE', 'FINAL', 'GA'].any { it -> version.toUpperCase().contains(it) }
    def regex = /^[0-9,.v-]+(-r)?$/
    return !stableKeyword && !(version ==~ regex)
}

// Configure Release Plugin for Automated Versioning
