    description = 'Performs dependency updates and security checks'
    group = 'verification'
}

// Enhanced publishing configuration for multiple environments
publishing {
    publications {
        maven(MavenPublication) {
            from components.java
            
            // Add additional artifacts
            artifact sourcesJar
            artifact javadocJar
            
            // Add all runtime dependencies to the POM
            pom.withXml {
                def dependenciesNode = asNode().appendNode('dependencies')
                configurations.implementation.allDependencies.each {
                    if (it.group != null && it.name != null) {
                        def dependencyNode = dependenciesNode.appendNode('dependency')
                        dependencyNode.appendNode('groupId', it.group)
                        dependencyNode.appendNode('artifactId', it.name)
                        dependencyNode.appendNode('version', it.version)
                        dependencyNode.appendNode('scope', 'runtime')
                    }
                }
            }
            
            pom {
                name = 'Jenkins Script Library'
                description = project.description
                url = 'https://github.com/thomasvincent/jenkins-script-library'
                
                licenses {
                    license {
                        name = 'Apache License 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0'
                    }
                }
                
                developers {
                    developer {
                        id = 'thomasvincent'
                        name = 'Thomas Vincent'
                    }
                }
                
                scm {
                    url = 'https://github.com/thomasvincent/jenkins-script-library'
                    connection = 'scm:git:git://github.com/thomasvincent/jenkins-script-library.git'
                    developerConnection = 'scm:git:ssh://github.com/thomasvincent/jenkins-script-library.git'
                }
            }
        }
    }
    
    repositories {
        // GitHub Packages repository
        maven {
            name = 'GitHubPackages'
            url = uri('https://maven.pkg.github.com/thomasvincent/jenkins-script-library')
            credentials {
                username = project.findProperty('gpr.user') ?: System.getenv('GITHUB_ACTOR')
                password = project.findProperty('gpr.key') ?: System.getenv('GITHUB_TOKEN')
            }
        }
        
        // Maven Central via Sonatype OSSRH
        maven {
            name = 'OSSRH'
            def releasesRepoUrl = 'https://s01.oss.sonatype.org/service/local/staging/deploy/maven2/'
            def snapshotsRepoUrl = 'https://s01.oss.sonatype.org/content/repositories/snapshots/'
            url = version.endsWith('SNAPSHOT') ? snapshotsRepoUrl : releasesRepoUrl
            
            credentials {
                username = project.findProperty('ossrh.user') ?: System.getenv('OSSRH_USERNAME')
                password = project.findProperty('ossrh.password') ?: System.getenv('OSSRH_PASSWORD')
            }
        }
        
        // Enterprise internal repository for staging
        maven {
            name = 'InternalStaging'
            url = project.findProperty('internal.repo.staging') ?: 'https://repo.internal.example.com/staging'
            
            credentials {
                username = project.findProperty('internal.repo.user') ?: System.getenv('REPO_USER')
                password = project.findProperty('internal.repo.password') ?: System.getenv('REPO_PASSWORD')
            }
        }
        
        // Enterprise internal repository for production
        maven {
            name = 'InternalProduction'
            url = project.findProperty('internal.repo.production') ?: 'https://repo.internal.example.com/releases'
            
            credentials {
                username = project.findProperty('internal.repo.user') ?: System.getenv('REPO_USER')
                password = project.findProperty('internal.repo.password') ?: System.getenv('REPO_PASSWORD')
            }
        }
    }
}

// Configure Nexus Publish Plugin
nexusPublishing {
    repositories {
        sonatype {
            nexusUrl.set(uri('https://s01.oss.sonatype.org/service/local/'))
            snapshotRepositoryUrl.set(uri('https://s01.oss.sonatype.org/content/repositories/snapshots/'))
            
            username.set(project.findProperty('ossrh.user') ?: System.getenv('OSSRH_USERNAME'))
            password.set(project.findProperty('ossrh.password') ?: System.getenv('OSSRH_PASSWORD'))
        }
    }
}

// Tasks for deploying to different environments
environments.each { envName, envConfig ->
    tasks.register("deployTo${envName.capitalize()}") {
        description = "Deploy to ${envName} environment"
        group = 'Publishing'
        
        // Prerequisites
        dependsOn build
        
        // Require approval for certain environments
        if (envConfig.requiresApproval) {
            doFirst {
                def confirmation = System.console()?.readLine("Are you sure you want to deploy to ${envName}? (y/n): ")
                if (confirmation != 'y') {
                    throw new StopExecutionException("Deployment to ${envName} was cancelled.")
                }
            }
        }
        
        doLast {
            println "Deploying version ${version} to ${envName} at ${envConfig.url}"
            // Add environment-specific deployment logic here
        }
    }
}

// Master task to deploy to all environments
tasks.register('deployToAll') {
    description = 'Deploy to all environments in sequence'
    group = 'Publishing'
    
    // Add environment deployments in the correct order
    dependsOn tasks.findByName('deployToDev')
    dependsOn tasks.findByName('deployToStaging')
    dependsOn tasks.findByName('deployToProduction')
}
