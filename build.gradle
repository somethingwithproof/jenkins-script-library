// Add comprehensive build health check
tasks.register('buildHealth') {
    description = 'Checks overall build health'
    group = 'Verification'
    
    dependsOn 'test'
    dependsOn 'integrationTest'
    dependsOn 'checkCoverage'
    dependsOn 'dependencyCheckAnalyze'
    dependsOn 'dependencyUpdates'
    dependsOn 'dependencyAnalysis'
    
    doLast {
        println "===== Build Health Report ====="
        println "Version: ${version}"
        println "Java Version: ${System.getProperty('java.version')}"
        println "Gradle Version: ${gradle.gradleVersion}"
        
        // Report on test results
        def testResultsDir = file("${buildDir}/test-results/test")
        if (testResultsDir.exists()) {
            def testCount = 0
            def failureCount = 0
            testResultsDir.listFiles().each { file ->
                if (file.name.endsWith('.xml')) {
                    def testsuite = new XmlSlurper().parse(file)
                    testCount += testsuite.@tests.toInteger()
                    failureCount += testsuite.@failures.toInteger()
                }
            }
            println "Unit Tests: ${testCount} tests, ${failureCount} failures"
        }
        
        // Report on coverage
        def coverageReport = file("${buildDir}/reports/jacoco/test/html/index.html")
        if (coverageReport.exists()) {
            println "Coverage Report: ${coverageReport.absolutePath}"
        }
        
        // Report on dependency issues
        def owaspReport = file("${buildDir}/reports/dependency-check-report.html")
        if (owaspReport.exists()) {
            println "Security Report: ${owaspReport.absolutePath}"
        }
        
        println "===== End of Build Health Report ====="
    }
}

// Add task to create a build profile report
tasks.register('buildProfile') {
    description = 'Generate detailed build profiling report'
    group = 'Build'
    
    doLast {
        def profileReport = file("${buildDir}/reports/profile")
        profileReport.mkdirs()
        def reportFile = new File(profileReport, "profile-${new Date().format('yyyyMMdd-HHmmss')}.txt")
        
        reportFile.withWriter { writer ->
            writer.writeLine("Build Profile Report - ${new Date()}")
            writer.writeLine("====================================")
            writer.writeLine("System Info:")
            writer.writeLine("  Java Version: ${System.getProperty('java.version')}")
            writer.writeLine("  OS: ${System.getProperty('os.name')} ${System.getProperty('os.version')}")
            writer.writeLine("  Available Processors: ${Runtime.runtime.availableProcessors()}")
            writer.writeLine("  Max Memory: ${Runtime.runtime.maxMemory() / (1024 * 1024)} MB")
            writer.writeLine("  Free Memory: ${Runtime.runtime.freeMemory() / (1024 * 1024)} MB")
            writer.writeLine("")
            writer.writeLine("Gradle Info:")
            writer.writeLine("  Gradle Version: ${gradle.gradleVersion}")
            writer.writeLine("  Gradle Home: ${gradle.gradleHomeDir}")
            writer.writeLine("  Project: ${project.name}")
            writer.writeLine("  Version: ${project.version}")
            writer.writeLine("")
            writer.writeLine("Build Cache:")
            writer.writeLine("  Local: ${gradle.startParameter.buildCacheEnabled}")
            writer.writeLine("")
            writer.writeLine("Configuration:")
            project.configurations.forEach { config ->
                writer.writeLine("  ${config.name}: ${config.files.size()} files")
            }
        }
        
        println "Build profile report generated: ${reportFile.absolutePath}"
    }
}

// Add CI-specific tasks
if (System.getenv("CI") == "true") {
    tasks.register('ciPipeline') {
        description = 'Runs the complete CI pipeline'
        group = 'CI/CD'
        
        // Basic pipeline steps
        dependsOn 'clean'
        dependsOn 'build'
        dependsOn 'test'
        dependsOn 'integrationTest'
        dependsOn 'checkCoverage'
        dependsOn 'dependencyCheckAnalyze'
        
        // Additional CI steps for branches
        if (System.getenv("BRANCH_NAME") == "main" || System.getenv("BRANCH_NAME") == "master") {
            dependsOn 'generateChangelog'
            dependsOn 'publish'
        }
        
        doFirst {
            println "===== CI Pipeline Started ====="
            println "Branch: ${System.getenv('BRANCH_NAME') ?: 'unknown'}"
            println "Commit: ${System.getenv('GIT_COMMIT') ?: 'unknown'}"
        }
        
        doLast {
            println "===== CI Pipeline Completed ====="
            println "Build Result: SUCCESS"
        }
    }
}
