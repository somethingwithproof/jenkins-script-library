tasks.register('generateChangelog') {
    description = 'Generate a changelog from Git commit history'
    group = 'Documentation'
    
    doLast {
        def changelogFile = file('CHANGELOG.md')
        def latestTag = 'git describe --tags --abbrev=0'.execute().text.trim()
        def previousTag = 'git describe --tags --abbrev=0 ${latestTag}^'.execute().text.trim()
        
        def commits = []
        if (previousTag) {
            commits = "git log ${previousTag}..${latestTag} --pretty=format:%s".execute().text.split('\n')
        } else {
            commits = "git log ${latestTag} --pretty=format:%s".execute().text.split('\n')
        }
        
        def version = latestTag.startsWith('v') ? latestTag.substring(1) : latestTag
        def date = new Date().format('yyyy-MM-dd')
        
        def features = []
        def fixes = []
        def other = []
        
        commits.each { commit ->
            if (commit.toLowerCase().startsWith('feat') || commit.toLowerCase().contains('feature')) {
                features.add("- ${commit}")
            } else if (commit.toLowerCase().startsWith('fix') || commit.toLowerCase().contains('bug')) {
                fixes.add("- ${commit}")
            } else {
                other.add("- ${commit}")
            }
        }
        
        def changelog = """# ${version} (${date})

## Features
${features.join('\n')}

## Bug Fixes
${fixes.join('\n')}

## Other Changes
${other.join('\n')}

"""
        
        if (changelogFile.exists()) {
            def existingChangelog = changelogFile.text
            changelogFile.text = changelog + existingChangelog
        } else {
            changelogFile.text = changelog
        }
        
        println "Changelog generated for version ${version}"
    }
}

// Build health monitoring task
