// Load version properties for semantic versioning
def versionProps = new Properties()
file('version.properties').withInputStream { versionProps.load(it) }

def versionMajor = versionProps['version.major'] as Integer
def versionMinor = versionProps['version.minor'] as Integer
def versionPatch = versionProps['version.patch'] as Integer
def versionPrerelease = versionProps['version.prerelease']

group = 'com.github.thomasvincent'
version = "${versionMajor}.${versionMinor}.${versionPatch}${versionPrerelease ? '-' + versionPrerelease : ''}"
description = 'Jenkins Script Library - A collection of Groovy utilities for Jenkins automation'

// Configure Gradle Enterprise and Build Scan
gradleEnterprise {
    buildScan {
        termsOfServiceUrl = "https://gradle.com/terms-of-service"
        termsOfServiceAgree = "yes"
        tag 'CI'
        
        // Add custom build scan info
        background {
            def branchName = 'unknown'
            try {
                branchName = 'git rev-parse --abbrev-ref HEAD'.execute().text.trim()
            } catch (Exception ignored) {}
            value 'Git branch', branchName
        }
        
        // Add link to build scans in your CI system
        if (System.getenv('CI') == 'true') {
            link 'CI Job', System.getenv('CI_JOB_URL')
        }
    }
}

// Configure dependency locking
dependencyLocking {
    lockAllConfigurations()
}

// Configure Git Properties Plugin
gitProperties {
    // SECURITY: These are Git metadata configuration keys, not credentials
    keys = ['git.branch', 'git.commit.id', 'git.commit.time', 'git.commit.message.short']
    dateFormat = "yyyy-MM-dd'T'HH:mm:ssZ"
    customProperty 'buildVersion', version
}

// Task to bump version
tasks.register('bumpMajor') {
    doLast {
        versionProps['version.major'] = (versionMajor + 1).toString()
        versionProps['version.minor'] = '0'
        versionProps['version.patch'] = '0'
        file('version.properties').withWriter { versionProps.store(it, null) }
        println "Version bumped to ${versionMajor + 1}.0.0"
    }
}

tasks.register('bumpMinor') {
    doLast {
        versionProps['version.minor'] = (versionMinor + 1).toString()
        versionProps['version.patch'] = '0'
        file('version.properties').withWriter { versionProps.store(it, null) }
        println "Version bumped to ${versionMajor}.${versionMinor + 1}.0"
    }
}

tasks.register('bumpPatch') {
    doLast {
        versionProps['version.patch'] = (versionPatch + 1).toString()
        file('version.properties').withWriter { versionProps.store(it, null) }
        println "Version bumped to ${versionMajor}.${versionMinor}.${versionPatch + 1}"
    }
}

tasks.register('release') {
    doLast {
        versionProps['version.prerelease'] = ''
        file('version.properties').withWriter { versionProps.store(it, null) }
        println "Released version ${versionMajor}.${versionMinor}.${versionPatch}"
    }
}

