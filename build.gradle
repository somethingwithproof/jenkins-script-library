plugins {
    id 'groovy'
    id 'codenarc'
    id 'jacoco'
    id 'maven-publish'
}

group = 'com.github.thomasvincent'
version = '1.0.0'
description = 'Jenkins Script Library - A collection of Groovy utilities for Jenkins automation'

repositories {
    mavenLocal()
    mavenCentral()
    maven { url 'https://repo.jenkins-ci.org/releases/' }
    maven { url 'https://repo.jenkins-ci.org/public/' }
}

ext {
    isJava17Plus = JavaVersion.current().isCompatibleWith(JavaVersion.VERSION_17)
    if (!isJava17Plus) throw new GradleException("Java 17+ is required")

    versions = [
        jenkinsCore: '2.361.4',
        groovy: '3.0.24',
        credentialsPlugin: '2.6.1',
        matrixAuthPlugin: '3.1.3',
        workflowApiPlugin: '2.46',
        workflowStepApiPlugin: '2.27',
        folderPlugin: '6.17',
        gitPlugin: '4.11.3',
        servletApi: '4.0.1',
        spockVersion: '2.3-groovy-3.0'
    ]
    println "Jenkins Core: ${versions.jenkinsCore}, Java 17+: ${isJava17Plus}"
}

def excludePatterns = [
    '**/cloud/**',
    '**/hudson/plugins/ec2/**',
    '**/scripts/**',
    '**/jobs/**',
    '**/config/**',
    '**/ssh/**',
    '**/remote/**',
    '**/docker/**',
    '**/aws/**',
    '**/azure/**',
    '**/jenkins/executor/**',
    '**/nodes/SlaveInfoManager.groovy'
]

sourceSets {
    main {
        groovy {
            srcDir 'src/main/groovy'
            exclude excludePatterns
        }
    }
    test {
        groovy {
            // Don't exclude test files
        }
    }
    integrationTest {
        groovy {
            srcDir 'src/integration-test/groovy'
            // Exclude tests for classes we've excluded from main
            exclude '**/config/JenkinsConfigBackupIntegrationTest.groovy'
            exclude '**/nodes/SlaveInfoManagerIntegrationTest.groovy'
            exclude '**/scripts/AnalyzePipelinePerformanceIntegrationTest.groovy'
            exclude '**/scripts/ListCloudNodesIntegrationTest.groovy'
            exclude '**/jobs/**'
        }
        resources.srcDir 'src/integration-test/resources'
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
}

configurations {
    integrationTestImplementation.extendsFrom testImplementation
    integrationTestRuntimeOnly.extendsFrom testRuntimeOnly
}

dependencies {
    implementation "org.codehaus.groovy:groovy-all:${versions.groovy}"
    implementation 'commons-cli:commons-cli:1.5.0'
    implementation 'org.apache.logging.log4j:log4j-api:2.25.0'
    implementation 'org.apache.logging.log4j:log4j-core:2.25.0'
    implementation "commons-io:commons-io:2.19.0"

    compileOnly "org.jenkins-ci.main:jenkins-core:${versions.jenkinsCore}"
    compileOnly "javax.servlet:javax.servlet-api:${versions.servletApi}"
    compileOnly "org.jenkins-ci.plugins:git:${versions.gitPlugin}"
    compileOnly "org.jenkins-ci.plugins:ssh-slaves:1.33.0"
    compileOnly "org.jenkins-ci.plugins:groovy:2.4"
    compileOnly "org.jenkins-ci.plugins:cloudbees-folder:${versions.folderPlugin}"
    compileOnly "org.jenkins-ci.plugins.workflow:workflow-job:2.42"
    compileOnly "org.jenkins-ci.plugins:credentials:${versions.credentialsPlugin}"
    compileOnly "org.jenkins-ci.plugins:plain-credentials:1.7"

    testImplementation 'junit:junit:4.13.2'
    testImplementation "org.spockframework:spock-core:${versions.spockVersion}"

    integrationTestImplementation "org.jenkins-ci.main:jenkins-core:${versions.jenkinsCore}"
    integrationTestImplementation "org.jenkins-ci.main:jenkins-test-harness:2.72"
    integrationTestImplementation "org.jenkins-ci.main:jenkins-war:${versions.jenkinsCore}@war"
    integrationTestImplementation "javax.servlet:javax.servlet-api:${versions.servletApi}"
    integrationTestImplementation "org.jenkins-ci.plugins:credentials:${versions.credentialsPlugin}"
    integrationTestImplementation "org.jenkins-ci.plugins:matrix-auth:${versions.matrixAuthPlugin}"
    integrationTestImplementation "org.jenkins-ci.plugins.workflow:workflow-api:${versions.workflowApiPlugin}"
    integrationTestImplementation "org.jenkins-ci.plugins.workflow:workflow-step-api:${versions.workflowStepApiPlugin}"
    integrationTestImplementation "org.jenkins-ci.plugins:cloudbees-folder:${versions.folderPlugin}"
    integrationTestImplementation "org.jenkins-ci.plugins:git:${versions.gitPlugin}"
    integrationTestRuntimeOnly 'org.slf4j:slf4j-simple:1.7.36'
    integrationTestRuntimeOnly 'org.jenkins-ci:SECURITY-144-compat:1.0'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

tasks.withType(GroovyCompile).configureEach {
    groovyOptions.optimizationOptions.indy = true
    sourceCompatibility = '17'
    targetCompatibility = '17'
}

test {
    useJUnit()
    testLogging { events "passed", "skipped", "failed" }
    finalizedBy jacocoTestReport
    onlyIf { !project.hasProperty('skipTests') }
}

tasks.register('integrationTest', Test) {
    description = 'Runs integration tests.'
    group = 'verification'
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath
    useJUnitPlatform()
    mustRunAfter test
    testLogging {
        events "passed", "skipped", "failed"
        showStandardStreams = true
    }
    onlyIf { !project.hasProperty('skipTests') }
}

check.dependsOn integrationTest

tasks.withType(CodeNarc).configureEach {
    enabled = true
    configFile = file('config/codenarc/codenarc.groovy')
    reports {
        html.required = true
        text.required = true
    }
    ignoreFailures = true
}

jacoco {
    toolVersion = "0.8.8"
}

jacocoTestReport {
    reports {
        xml.required = true
        html.required = true
    }
}

jacocoTestCoverageVerification {
    violationRules {
        rule {
            limit { minimum = 0.05 }
        }
        rule {
            element = 'CLASS'
            excludes = [
                '*.Test*', '*Test', '*Tests',
                'com.github.thomasvincent.jenkinsscripts.security.*',
                'com.github.thomasvincent.jenkinsscripts.helm.*',
                'com.github.thomasvincent.jenkinsscripts.nodes.*',
                'com.github.thomasvincent.jenkinsscripts.jobs.*',
                'com.github.thomasvincent.jenkinsscripts.groovydoc.*',
                'hudson.*'
            ]
            limit {
                counter = 'LINE'
                minimum = 0.75
            }
        }
    }
}

check.dependsOn jacocoTestCoverageVerification
jacocoTestCoverageVerification.dependsOn jacocoTestReport

task scriptJar(type: Jar) {
    archiveBaseName = 'jenkins-script-library'
    archiveClassifier = 'scripts'
    from sourceSets.main.allSource
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
            artifact scriptJar
        }
    }
}

configurations.all {
    resolutionStrategy {
        cacheDynamicVersionsFor 10, 'minutes'
        cacheChangingModulesFor 4, 'hours'
        force "org.codehaus.groovy:groovy-all:${versions.groovy}"
        force "javax.servlet:javax.servlet-api:${versions.servletApi}"
        force "org.jenkins-ci.main:jenkins-core:${versions.jenkinsCore}"
        force "org.jenkins-ci.plugins:credentials:${versions.credentialsPlugin}"
        force "org.jenkins-ci.plugins:matrix-auth:${versions.matrixAuthPlugin}"
        force "org.spockframework:spock-core:${versions.spockVersion}"
        force 'com.github.spotbugs:spotbugs-annotations:4.9.3'

        eachDependency { details ->
            if (details.requested.group == 'org.springframework.security') {
                force "org.springframework.security:spring-security-web:6.5.1"
                force "org.springframework.security:spring-security-core:6.5.1"
                force "org.springframework.security:spring-security-crypto:6.5.1"
            }
        }
    }
}

task downloadDependencies {
    description = 'Preloads dependencies to the local Maven cache'
    group = 'build setup'
    doLast {
        configurations.each { it.files }
        println "Downloaded all dependencies to Maven cache"
    }
}

tasks.withType(Test).configureEach {
    maxParallelForks = Math.max(1, (Runtime.runtime.availableProcessors() / 2).intValue())
}

try {
    buildCache {
        local {
            enabled = true
            directory = "${rootProject.buildDir}/cache"
        }
    }
} catch (ignored) {
    println "Build cache not supported in this Gradle version"
}

